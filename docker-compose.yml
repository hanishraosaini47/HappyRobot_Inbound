services:
  backend:
    build: ./backend
    container_name: carrier-backend
    environment:
      DATABASE_URL: sqlite:////app/data/carrier.db
      API_KEY: dev_secret_change_me
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080,http://127.0.0.1:5173,http://127.0.0.1:8080
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    command: >
      sh -c "mkdir -p /app/data && python -m seed.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    container_name: carrier-dashboard
    ports:
      - "8080:80"
    depends_on:
      - backend